<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Board Games Search</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="toolbar">
        <label class="search-field" for="searchInput">
          <span class="sr-only">Recherche</span>
          <input
            id="searchInput"
            type="search"
            placeholder="Saisissez des mots-clés (qui seront ajoutés aux URL ci-dessous)"
            autocomplete="off"
          />
        </label>
      </header>

      <div class="filters">
        <label class="filter-field" for="countryFilter">
          <span class="filter-label">Pays</span>
          <select id="countryFilter" multiple></select>
          <button id="clearCountriesButton" type="button">RAZ</button>
        </label>
        <label class="filter-field" for="categoryFilter">
          <span class="filter-label">Catégories</span>
          <select id="categoryFilter" multiple></select>
          <button id="clearCategoriesButton" type="button">RAZ</button>
        </label>
        <label class="filter-field" for="tagFilter">
          <span class="filter-label">Tags</span>
          <select id="tagFilter" multiple></select>
          <button id="clearTagsButton" type="button">RAZ</button>
        </label>
        <div class="toolbar-actions">
          <button id="selectAllButton" type="button">Sélectionner tout</button>
          <button id="deselectAllButton" type="button">Déselectionner tout</button>
          <!-- disabled class="disabled" -->
          <button id="openAllButton" type="button">Ouvrir tout</button>
        </div>
      </div>

      <p id="status" class="status">Chargement…</p>
      <div id="sitesList" class="sites-grid" aria-live="polite"></div>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
